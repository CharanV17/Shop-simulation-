services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-vr-app
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      MONGO_URI: ${MONGO_URI:-mongodb+srv://CharanV17:L1qorYsk7LNV1qBU@charan17.icrlhlw.mongodb.net/?appName=Charan17}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-nexus-vr}
      JWT_SECRET: change-me-in-production
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: nexus-vr-mongo
    profiles: ["local-db"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo_data:
